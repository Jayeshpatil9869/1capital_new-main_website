# ==============================================================================
# NGINX Configuration for 1capital.in (React + Vite SPA)
# Optimized for Cloudflare Proxy (Origin Server: 72.61.141.247)
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Cloudflare Real IP Configuration
# This ensures that Nginx logs the actual client/visitor IP address instead of 
# Cloudflare's proxy servers IP addresses in access logs.
# Reference: https://www.cloudflare.com/ips/
# ------------------------------------------------------------------------------

# Cloudflare IPv4 Ranges
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# Cloudflare IPv6 Ranges
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# Use the Cloudflare header containing the client's actual IP
real_ip_header CF-Connecting-IP;

# ------------------------------------------------------------------------------
# 2. HTTP Server Block (Port 80)
# Handles redirecting HTTP traffic to HTTPS.
# Works with Cloudflare SSL modes "Full" and "Full (strict)".
# ------------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name 1capital.in www.1capital.in;

    # Certbot challenge directory (For Let's Encrypt SSL renewal verification)
    location /.well-known/acme-challenge/ {
        root /var/www/1capital;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://1capital.in$request_uri;
    }
}

# ------------------------------------------------------------------------------
# 3. HTTPS Server Block (Port 443) - RECOMMENDED (Full / Full strict SSL)
# Handles secure requests directly using SSL certificates on the origin server.
# ------------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 1capital.in;

    # SSL Certificates (Managed via Certbot/Let's Encrypt)
    # Note: Replace these paths if your certificate filenames differ.
    ssl_certificate /etc/letsencrypt/live/1capital.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1capital.in/privkey.pem;

    # Modern SSL configuration and performance parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Web Root Directory (Static build folder of React SPA)
    root /var/www/1capital/dist;
    index index.html;

    # Enable high-performance gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # Security Headers (OWASP Recommended)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;
    # Enable HTTP Strict Transport Security (HSTS) if not managed by Cloudflare directly
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # React Router / Client-side SPA routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite builds unique asset names on build)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Ignore common requests
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
}

# ------------------------------------------------------------------------------
# 4. HTTPS WWW Redirect Server Block
# Redirects https://www.1capital.in -> https://1capital.in
# ------------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.1capital.in;

    ssl_certificate /etc/letsencrypt/live/1capital.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1capital.in/privkey.pem;

    return 301 https://1capital.in$request_uri;
}


