# ============================================================
# NGINX CONFIGURATION FOR 1CAPITAL.IN (FULL / STRICT SSL MODE)
# ============================================================
# This configuration assumes you are running Gunicorn on port 8000.
# Place this file in /etc/nginx/sites-available/1capital.in and create
# a symlink to /etc/nginx/sites-enabled/1capital.in

# 1. Redirect HTTP (Port 80) to HTTPS (Port 443)
server {
    listen 80;
    listen [::]:80;
    server_name 1capital.in www.1capital.in;

    # Redirect all HTTP requests to HTTPS
    return 301 https://1capital.in$request_uri;
}

# 2. Redirect www.1capital.in (HTTPS) to non-www 1capital.in (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.1capital.in;

    # SSL Certificate Paths (Let's Encrypt / Certbot paths)
    ssl_certificate /etc/letsencrypt/live/1capital.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1capital.in/privkey.pem;
    
    # Recommended SSL parameters
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect to non-www
    return 301 https://1capital.in$request_uri;
}

# 3. Main Application Server Block (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 1capital.in;

    # SSL Certificate Paths (Let's Encrypt / Certbot paths)
    ssl_certificate /etc/letsencrypt/live/1capital.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1capital.in/privkey.pem;
    
    # Recommended SSL parameters
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client Request Body Limits (Allows up to 10MB file uploads)
    client_max_body_size 10M;

    # Serving Django Static Files
    # Compile these on the server using: python manage.py collectstatic
    location /static/ {
        alias /var/www/1capital/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Serving Django Media Uploads (if any)
    location /media/ {
        alias /var/www/1capital/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Proxy requests to Django / Gunicorn backend running on local port 8000
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Keep-Alive & WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Standard Proxy Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
