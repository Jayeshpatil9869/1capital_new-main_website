# ============================================================
# NGINX CONFIGURATION FOR 1CAPITAL.IN (FLEXIBLE SSL MODE)
# ============================================================
# This configuration is for Cloudflare Flexible SSL mode.
# Cloudflare handles the HTTPS connection with users and communicates
# with your Nginx server over HTTP (Port 80).
# Place this file in /etc/nginx/sites-available/1capital.in and create
# a symlink to /etc/nginx/sites-enabled/1capital.in

server {
    listen 80;
    listen [::]:80;
    server_name 1capital.in www.1capital.in;

    # 1. Redirect www.1capital.in to 1capital.in
    if ($host = "www.1capital.in") {
        return 301 https://1capital.in$request_uri;
    }

    # 2. Prevent infinite redirect loops under Cloudflare Flexible SSL.
    # Cloudflare sets X-Forwarded-Proto to "https" when the browser connects via HTTPS.
    # We only redirect to HTTPS if the incoming connection is not marked HTTPS.
    if ($http_x_forwarded_proto != "https") {
        return 301 https://1capital.in$request_uri;
    }

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client Request Body Limits (Allows up to 10MB file uploads)
    client_max_body_size 10M;

    # Serving Django Static Files
    # Compile these on the server using: python manage.py collectstatic
    location /static/ {
        alias /var/www/1capital/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Serving Django Media Uploads (if any)
    location /media/ {
        alias /var/www/1capital/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Proxy requests to Django / Gunicorn backend running on local port 8000
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Keep-Alive & WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto; # Use Cloudflare's scheme
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Standard Proxy Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
